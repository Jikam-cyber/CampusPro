<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CampusPro — Matières</title>
  <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
<div class="app-layout">
  <aside class="sidebar">
    <div class="sidebar-logo"><div class="logo-icon">🎓</div><div><div class="logo-text">CampusPro</div><div class="logo-sub">Administration</div></div></div>
    <nav class="sidebar-nav">
      <div class="nav-section-title">Principal</div>
      <a href="/admin/dashboard" class="nav-item"><span class="nav-icon">📊</span> Dashboard</a>
      <div class="nav-section-title">Gestion</div>
      <a href="/admin/students" class="nav-item"><span class="nav-icon">👨‍🎓</span> Étudiants</a>
      <a href="/admin/professors" class="nav-item"><span class="nav-icon">👨‍🏫</span> Professeurs</a>
      <a href="/admin/matieres" class="nav-item active"><span class="nav-icon">📚</span> Matières</a>
      <a href="/admin/classes" class="nav-item"><span class="nav-icon">🏫</span> Classes</a>
    </nav>
    <div class="sidebar-footer">
      <div class="user-card">
        <div class="user-avatar">A</div>
        <div><div class="user-name">Administrateur</div><div class="user-role">Accès complet</div></div>
        <a href="/logout" style="margin-left:auto;color:var(--text-muted);text-decoration:none;font-size:18px;">⏻</a>
      </div>
    </div>
  </aside>
  <main class="main-content">
    <div class="topbar">
      <div><div class="topbar-title">📚 Matières</div><div class="topbar-subtitle">Gestion des matières enseignées</div></div>
      <button class="btn btn-primary" onclick="openModal('modal-add')">+ Ajouter</button>
    </div>
    <div class="page-content fade-in">
      <div class="table-wrapper">
        <div class="table-header"><span class="table-title">Liste des matières</span></div>
        <table>
          <thead><tr><th>ID</th><th>Nom</th><th>Code</th><th>Coefficient</th><th>Actions</th></tr></thead>
          <tbody>
            <tr th:each="m : ${matieres}">
              <td><span class="badge badge-indigo" th:text="${m.id}"></span></td>
              <td style="font-weight:600;color:var(--text-primary);" th:text="${m.nom}"></td>
              <td><span class="badge badge-gray" th:text="${m.code}"></span></td>
              <td th:text="${m.coefficient}"></td>
              <td><a th:href="@{/admin/matieres/delete/{id}(id=${m.id})}" class="btn btn-sm btn-danger" onclick="return confirm('Supprimer ?')">🗑</a></td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </main>
</div>

<div class="modal-overlay" id="modal-add">
  <div class="modal">
    <div class="modal-title">📚 Ajouter une matière</div>
    <form th:action="@{/admin/matieres/add}" method="post">
      <div class="form-group"><label class="form-label">Nom</label><input type="text" name="nom" class="form-control" required placeholder="Ex: Chimie"/></div>
      <div class="form-group"><label class="form-label">Code</label><input type="text" name="code" class="form-control" required placeholder="Ex: CHIM"/></div>
      <div class="form-group"><label class="form-label">Coefficient</label><input type="number" name="coefficient" class="form-control" value="2" min="1" max="6"/></div>
      <div style="display:flex;gap:10px;margin-top:20px;">
        <button type="submit" class="btn btn-primary" style="flex:1;">Ajouter</button>
        <button type="button" class="btn btn-ghost" onclick="closeModal('modal-add')" style="flex:1;">Annuler</button>
      </div>
    </form>
  </div>
</div>
<script>
  function openModal(id) { document.getElementById(id).classList.add('open'); }
  function closeModal(id) { document.getElementById(id).classList.remove('open'); }
</script>
</body>
</html>
